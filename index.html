<!-- ========================= index.html ========================= -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AURA — Autonomous Reception</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-animation"></div>

  <header class="navbar">
    <div class="logo">AURA 🤖</div>
    <nav>
      <!--<a class = "redirect" href="#features">Features</a>-->
      <a class = "redirect" href="details.html">Details</a>
    </nav>
  </header>

  <section class="hero">
    <h1 class="glow">Your Autonomous Front Desk</h1>
    <p>AI that talks, thinks, and optimizes your business</p>
    <button onclick="redirect()">Explore</button>
  </section>

  <section id="features" class="features">

    <!-- Smart Scheduling -->
    <div class="card">
      <h3>📅 Smart Scheduling</h3>
      <div class="mock">
        <p id="schedule">Next available: 10:00 AM</p>
        <button onclick="optimize()">Optimize Schedule</button>
      </div>
    </div>

    <!-- No Show Predictor -->
    <div class="card">
      <h3>📉 No-Show AI</h3>
      <div class="mock">
        <p>Probability: <span id="prob">20%</span></p>
        <div class="bar"><div id="barFill"></div></div>
        <button onclick="predict()">Analyze</button>
      </div>
    </div>

    <!-- Voice AI -->
    <div class="card">
      <h3>🎙️ Voice AI</h3>
      <div class="mock center">
        <div id="voiceUI" class="mic" onclick="startVoice()">🎤</div>
        <p id="voiceText">Tap to speak</p>
      </div>
    </div>

    <!-- Waitlist -->
    <div class="card">
      <h3>🔁 Waitlist Automation</h3>
      <div class="mock">
        <ul id="waitlist">
          <li>John</li>
          <li>Sarah</li>
        </ul>
        <button onclick="fillSlot()">Auto Fill Slot</button>
      </div>
    </div>

    <!-- Analytics -->
    <div class="card">
      <h3>📊 Analytics</h3>
      <div class="mock">
        <div class="chart">
          <div class="barcol" style="height:40%"></div>
          <div class="barcol" style="height:70%"></div>
          <div class="barcol" style="height:50%"></div>
          <div class="barcol" style="height:90%"></div>
          <div class="barcol" style="height:60%"></div>
        </div>
      </div>
    </div>

  </section>

  <footer>AURA © 2026</footer>

<script>
function redirect(){
  window.location.replace("details.html")
}

function scrollToFeatures(){ document.getElementById('features').scrollIntoView({behavior:'smooth'}); }

function optimize(){
  document.getElementById('schedule').innerText = "Optimized: 9:30 AM (Higher efficiency)";
}

function predict(){
  let val = Math.floor(Math.random()*100);
  document.getElementById('prob').innerText = val + "%";
  document.getElementById('barFill').style.width = val + "%";
}

function fillSlot(){
  let li = document.createElement('li');
  li.innerText = "Auto-filled user accepted slot";
  document.getElementById('waitlist').appendChild(li);
}

function startVoice(){
  let voiceUI = document.getElementById('voiceUI');
  let text = document.getElementById('voiceText');

  voiceUI.classList.remove('mic');
  voiceUI.classList.add('wave');
  voiceUI.innerText = "";
  text.innerText = "Listening...";

  setTimeout(()=>{
    text.innerText = "Processing...";
  },1500);

  setTimeout(()=>{
    let date = new Date();
    date.setDate(date.getDate() + Math.floor(Math.random()*5));
    let time = Math.floor(Math.random()*12)+8;
    text.innerText = `Slot confirmed at ${date.toDateString()} ${time}:00`;

    voiceUI.classList.remove('wave');
    voiceUI.classList.add('mic');
    voiceUI.innerText = "🎤";
  },3000);
}
</script>

</body>
</html>
